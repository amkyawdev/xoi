<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading...</title>
    
    <style>
        :root {
            --primary: #2563eb;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        
        .loader-container {
            text-align: center;
            color: white;
        }
        
        .loader-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            animation: bounce 1s ease-in-out infinite;
        }
        
        .loader-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .status-text {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-top: 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <svg class="loader-logo" viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="45" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2"/>
            <path d="M30 40L50 25L70 40V60L50 75L30 60V40Z" fill="white" fill-opacity="0.4" stroke="white" stroke-width="2"/>
            <circle cx="50" cy="50" r="8" fill="white"/>
        </svg>
        
        <h1 class="loader-title">AmkyawDev AI</h1>
        <div class="spinner"></div>
        <p class="status-text">Processing your request<span id="dots">...</span></p>
    </div>
    
    <script>
        // Animated dots
        const dots = document.getElementById('dots');
        let count = 0;
        setInterval(() => {
            dots.textContent = '.'.repeat((count % 3) + 1);
            count++;
        }, 500);
    </script>
</body>
</html>
