<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amkyaw AI Agent</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="stylesheet" href="/src/css/chat.css">
    <link rel="stylesheet" href="/src/css/animations.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Amkyaw</h1>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="nav-item active">Chat</a>
                <a href="/src/pages/docs.html" class="nav-item">Docs</a>
                <a href="/src/pages/skills.html" class="nav-item">Skills</a>
                <a href="/src/pages/about.html" class="nav-item">About</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                    <span class="user-name">User</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="chat-container">
                <div class="chat-header">
                    <h2>Chat with AI</h2>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="welcome-icon">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                <path d="M2 17l10 5 10-5"></path>
                                <path d="M2 12l10 5 10-5"></path>
                            </svg>
                        </div>
                        <h3>Welcome to Amkyaw AI</h3>
                        <p>Your intelligent assistant ready to help</p>
                    </div>
                </div>
                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <textarea 
                            id="chatInput" 
                            placeholder="Message Amkyaw..." 
                            rows="1"
                            autocomplete="off"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Amkyaw can make mistakes. Consider checking important information.</p>
                </div>
            </div>
        </main>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-animation" id="loadingAnimation"></div>
            <p class="loading-text" id="loadingText">Thinking...</p>
        </div>
    </div>

    <script src="/src/js/utils.js"></script>
    <script src="/src/js/animations.js"></script>
    <script src="/src/js/chat.js"></script>
    <script src="/src/js/app.js"></script>
</body>
</html>
