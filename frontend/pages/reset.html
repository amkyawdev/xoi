<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - AmkyawDev AI</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../src/css/design-system.css" />
    <link rel="icon" type="image/x-icon" href="../public/favicon.ico" />
    
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: var(--space-xl);
        }
        .form-control {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: var(--space-md);
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .input-icon {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-right: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            padding: var(--space-md);
            color: var(--text-muted);
        }
        .input-with-icon {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all var(--transition-fast);
        }
        .input-with-icon:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .input-with-icon input {
            flex: 1;
            border: none;
            background: transparent;
            padding: var(--space-md);
            color: var(--text-primary);
        }
        .input-with-icon input:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="auth-card card animate-fade-in">
        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="avatar mx-auto mb-3" style="background: var(--gradient-primary);">
                <i data-lucide="key" width="24" height="24"></i>
            </div>
            <h3 class="fw-bold mb-1">Reset Password</h3>
            <p class="text-muted mb-0">Enter your email to receive reset instructions</p>
        </div>
        
        <form id="resetForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-with-icon">
                    <span class="input-icon">
                        <i data-lucide="mail" width="18" height="18"></i>
                    </span>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" id="resetBtn">
                <span id="resetText">Send Reset Link</span>
            </button>
            
            <div id="resetSuccess" class="alert alert-success mt-3 d-none">
                Password reset link sent! Check your email.
            </div>
            
            <div id="resetError" class="alert alert-danger mt-3 d-none"></div>
        </form>
        
        <p class="text-center mt-4 mb-0">
            Remember your password? <a href="login.html" class="fw-semibold">Sign in</a>
        </p>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-muted text-decoration-none">
                <i data-lucide="arrow-left" width="14" height="14" class="me-1"></i>
                Back to Home
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="../src/js/utils.js"></script>
    <script src="../src/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resetForm = document.getElementById('resetForm');
            const resetBtn = document.getElementById('resetBtn');
            const resetError = document.getElementById('resetError');
            const resetSuccess = document.getElementById('resetSuccess');
            
            if (resetForm) {
                resetForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    resetError.classList.add('d-none');
                    resetSuccess.classList.add('d-none');
                    resetBtn.disabled = true;
                    document.getElementById('resetText').textContent = 'Sending...';
                    
                    const email = document.getElementById('email').value;
                    
                    try {
                        const result = await window.auth.reset(email);
                        if (result.success) {
                            resetSuccess.classList.remove('d-none');
                            resetForm.reset();
                        } else {
                            resetError.textContent = result.error || 'Failed to send reset email.';
                            resetError.classList.remove('d-none');
                        }
                    } catch (error) {
                        console.error('Reset error:', error);
                        resetError.textContent = 'Connection error. Please try again.';
                        resetError.classList.remove('d-none');
                    } finally {
                        resetBtn.disabled = false;
                        document.getElementById('resetText').textContent = 'Send Reset Link';
                    }
                });
            }
        });
    </script>
</body>
</html>
