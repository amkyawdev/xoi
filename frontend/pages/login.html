<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - AmkyawDev AI</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../src/css/design-system.css" />
    <link rel="icon" type="image/x-icon" href="../public/favicon.ico" />
    
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: var(--space-xl);
        }
        .form-control {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: var(--space-md);
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .input-icon {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-right: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            padding: var(--space-md);
            color: var(--text-muted);
        }
        .input-with-icon {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all var(--transition-fast);
        }
        .input-with-icon:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .input-with-icon input {
            flex: 1;
            border: none;
            background: transparent;
            padding: var(--space-md);
            color: var(--text-primary);
        }
        .input-with-icon input:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="auth-card card animate-fade-in">
        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="avatar mx-auto mb-3" style="background: var(--gradient-primary);">
                <i data-lucide="bot" width="24" height="24"></i>
            </div>
            <h3 class="fw-bold mb-1">Welcome Back</h3>
            <p class="text-muted mb-0">Sign in to continue to AmkyawDev AI</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-with-icon">
                    <span class="input-icon">
                        <i data-lucide="mail" width="18" height="18"></i>
                    </span>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-icon">
                    <span class="input-icon">
                        <i data-lucide="lock" width="18" height="18"></i>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label text-muted" for="remember">Remember me</label>
                </div>
                <a href="reset.html" class="text-decoration-none">Forgot password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                <span id="loginText">Sign In</span>
            </button>
            
            <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
        </form>
        
        <p class="text-center mt-4 mb-0">
            Don't have an account? <a href="register.html" class="fw-semibold">Sign up</a>
        </p>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-muted text-decoration-none">
                <i data-lucide="arrow-left" width="14" height="14" class="me-1"></i>
                Back to Home
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="../src/js/utils.js"></script>
    <script src="../src/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    loginError.classList.add('d-none');
                    loginBtn.disabled = true;
                    document.getElementById('loginText').textContent = 'Signing in...';
                    
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    
                    try {
                        const result = await window.auth.login(email, password);
                        if (result.success) {
                            window.location.href = 'index.html';
                        } else {
                            loginError.textContent = result.error || 'Login failed. Please check your credentials.';
                            loginError.classList.remove('d-none');
                            loginBtn.disabled = false;
                            document.getElementById('loginText').textContent = 'Sign In';
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        loginError.textContent = 'Connection error. Please try again.';
                        loginError.classList.remove('d-none');
                        loginBtn.disabled = false;
                        document.getElementById('loginText').textContent = 'Sign In';
                    }
                });
            }
        });
    </script>
</body>
</html>
