<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - AmkyawDev AI</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../src/css/design-system.css" />
    <link rel="icon" type="image/x-icon" href="../public/favicon.ico" />
    
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: var(--space-xl);
        }
        .form-control {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: var(--space-md);
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .input-icon {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-right: none;
            border-radius: var(--radius-md) 0 0 var(--radius-md);
            padding: var(--space-md);
            color: var(--text-muted);
        }
        .input-with-icon {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all var(--transition-fast);
        }
        .input-with-icon:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .input-with-icon input {
            flex: 1;
            border: none;
            background: transparent;
            padding: var(--space-md);
            color: var(--text-primary);
        }
        .input-with-icon input:focus {
            outline: none;
        }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="auth-card card animate-fade-in">
        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="avatar mx-auto mb-3" style="background: var(--gradient-primary);">
                <i data-lucide="bot" width="24" height="24"></i>
            </div>
            <h3 class="fw-bold mb-1">Create Account</h3>
            <p class="text-muted mb-0">Join AmkyawDev AI today</p>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-with-icon">
                    <span class="input-icon">
                        <i data-lucide="user" width="18" height="18"></i>
                    </span>
                    <input type="text" id="name" placeholder="Your name" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-with-icon">
                    <span class="input-icon">
                        <i data-lucide="mail" width="18" height="18"></i>
                    </span>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-with-icon">
                    <span class="input-icon">
                        <i data-lucide="lock" width="18" height="18"></i>
                    </span>
                    <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
                </div>
                <div class="password-strength bg-light mt-2">
                    <div id="passwordStrengthBar" style="width: 0%; height: 100%; border-radius: 2px;"></div>
                </div>
                <small class="text-muted" id="passwordHint">Use 8+ characters with letters and numbers</small>
            </div>
            
            <button type="submit" class="btn btn-primary w-100" id="registerBtn">
                <span id="registerText">Create Account</span>
            </button>
            
            <div id="registerError" class="alert alert-danger mt-3 d-none"></div>
        </form>
        
        <p class="text-center mt-4 mb-0">
            Already have an account? <a href="login.html" class="fw-semibold">Sign in</a>
        </p>
        
        <div class="text-center mt-4">
            <a href="index.html" class="text-muted text-decoration-none">
                <i data-lucide="arrow-left" width="14" height="14" class="me-1"></i>
                Back to Home
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="../src/js/utils.js"></script>
    <script src="../src/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            const registerBtn = document.getElementById('registerBtn');
            const registerError = document.getElementById('registerError');
            const passwordInput = document.getElementById('password');
            const strengthBar = document.getElementById('passwordStrengthBar');
            const passwordHint = document.getElementById('passwordHint');
            
            // Password strength meter
            passwordInput.addEventListener('input', () => {
                const password = passwordInput.value;
                let strength = 0;
                let color = '#374151';
                
                if (password.length >= 8) strength += 25;
                if (/[a-z]/.test(password)) strength += 25;
                if (/[A-Z]/.test(password)) strength += 25;
                if (/[0-9]/.test(password) || /[^a-zA-Z0-9]/.test(password)) strength += 25;
                
                if (strength <= 25) color = '#ef4444';
                else if (strength <= 50) color = '#f59e0b';
                else if (strength <= 75) color = '#3b82f6';
                else color = '#22c55e';
                
                strengthBar.style.width = strength + '%';
                strengthBar.style.backgroundColor = color;
                passwordHint.style.color = color;
            });
            
            if (registerForm) {
                registerForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    registerError.classList.add('d-none');
                    registerBtn.disabled = true;
                    document.getElementById('registerText').textContent = 'Creating account...';
                    
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    
                    try {
                        const result = await window.auth.register(name, email, password);
                        if (result.success) {
                            window.location.href = 'index.html';
                        } else {
                            registerError.textContent = result.error || 'Registration failed. Please try again.';
                            registerError.classList.remove('d-none');
                            registerBtn.disabled = false;
                            document.getElementById('registerText').textContent = 'Create Account';
                        }
                    } catch (error) {
                        console.error('Registration error:', error);
                        registerError.textContent = 'Connection error. Please try again.';
                        registerError.classList.remove('d-none');
                        registerBtn.disabled = false;
                        document.getElementById('registerText').textContent = 'Create Account';
                    }
                });
            }
        });
    </script>
</body>
</html>
