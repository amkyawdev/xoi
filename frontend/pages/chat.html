<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AmkyawDev AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0f;--sidebar:#12121a;--surface:#1a1a24;--surface-h:#22222e;--border:#2a2a3a;--text:#f1f5f9;--text-sec:#94a3b8;--text-mut:#64748b;--primary:#6366f1;--primary-h:#818cf8;--cyan:#22d3ee;--green:#22c55e;--grad1:#6366f1;--grad2:#8b5cf6;--grad3:#ec4899}
        body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
        .layout{display:flex;height:100vh}
        
        /* SIDEBAR */
        .sidebar{width:280px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s}
        .sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
        .brand{display:flex;align-items:center;gap:12px}
        .brand-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--grad1),var(--grad2));border-radius:12px;display:flex;align-items:center;justify-content:center}
        .brand-logo i{color:#fff}
        .brand-text h3{font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--text),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .brand-text span{font-size:11px;color:var(--text-mut)}
        .new-chat-btn{margin:16px;padding:12px 16px;background:var(--primary);border:none;border-radius:12px;color:#fff;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
        .new-chat-btn:hover{background:var(--primary-h);transform:translateY(-1px)}
        .history{flex:1;overflow-y:auto;padding:0 12px}
        .history-label{padding:12px 8px 8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-mut)}
        .history-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:2px;color:var(--text-sec);font-size:13px}
        .history-item:hover{background:var(--surface-h)}
        .history-item.active{background:var(--surface);border:1px solid var(--border)}
        .sidebar-footer{padding:16px;border-top:1px solid var(--border)}
        .model-select{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
        .model-select label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-mut);margin-bottom:6px;display:block}
        .model-select select{width:100%;background:transparent;border:none;color:var(--text);font-size:13px;cursor:pointer;outline:none}
        .user-profile{display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface);border-radius:10px}
        .user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--grad1),var(--grad3));display:flex;align-items:center;justify-content:center}
        .user-avatar i{color:#fff;width:16px;height:16px}
        .user-info{flex:1}
        .user-info h4{font-size:13px;font-weight:500}
        .user-info span{font-size:11px;color:var(--text-mut)}
        
        /* MAIN */
        .main{flex:1;display:flex;flex-direction:column}
        .header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--sidebar)}
        .header-left{display:flex;align-items:center;gap:16px}
        .menu-btn{background:none;border:none;color:var(--text-sec);cursor:pointer;padding:8px;border-radius:8px;display:none}
        .menu-btn:hover{background:var(--surface)}
        .status{display:flex;align-items:center;gap:8px}
        .status-dot{width:10px;height:10px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .status span{font-size:13px;color:var(--text-sec)}
        .header-right{display:flex;align-items:center;gap:8px}
        .topbar-btn{background:none;border:none;color:var(--text-sec);cursor:pointer;padding:10px;border-radius:10px;transition:all .2s}
        .topbar-btn:hover{background:var(--surface);color:var(--text)}
        
        /* MESSAGES */
        .messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:24px}
        .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
        .welcome-hero{width:100px;height:100px;background:linear-gradient(135deg,var(--grad1),var(--grad2),var(--grad3));border-radius:28px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .welcome-hero i{width:48px;height:48px;color:#fff}
        .welcome h1{font-size:28px;font-weight:700;margin-bottom:12px;background:linear-gradient(135deg,var(--text),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome p{font-size:15px;color:var(--text-sec);max-width:480px;margin-bottom:32px;line-height:1.6}
        .quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:500px;width:100%}
        .quick-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:flex-start;gap:12px}
        .quick-btn:hover{background:var(--surface-h);border-color:var(--primary);transform:translateY(-2px)}
        .quick-icon{width:36px;height:36px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .quick-icon i{color:#fff}
        .quick-content h4{font-size:13px;font-weight:600;margin-bottom:2px}
        .quick-content p{font-size:11px;color:var(--text-mut)}
        
        /* MESSAGE */
        .message{display:flex;gap:12px;max-width:800px;animation:slideIn .3s ease}
        @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{margin-left:auto;flex-direction:row-reverse}
        .msg-avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .message.assistant .msg-avatar{background:linear-gradient(135deg,var(--grad1),var(--grad2))}
        .message.user .msg-avatar{background:var(--surface)}
        .msg-avatar i{width:18px;height:18px;color:#fff}
        .message.user .msg-avatar i{color:var(--text-sec)}
        .msg-content{flex:1}
        .msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7}
        .message.assistant .msg-bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px}
        .message.user .msg-bubble{background:linear-gradient(135deg,var(--grad1),var(--grad2));border-top-right-radius:4px;color:#fff}
        .msg-time{font-size:11px;color:var(--text-mut);margin-top:4px;padding:0 4px}
        .message.user .msg-time{text-align:right}
        .msg-bubble pre{background:#0d0d14;border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0}
        .msg-bubble code{font-family:'JetBrains Mono',monospace;font-size:12px}
        .msg-bubble pre code{color:#e2e8f0}
        
        /* TYPING */
        .typing{display:flex;gap:4px;padding:16px}
        .typing span{width:8px;height:8px;background:var(--text-mut);border-radius:50%;animation:typing 1.4s infinite}
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
        
        /* INPUT */
        .input-area{padding:16px 24px 24px;background:linear-gradient(to top,var(--sidebar) 0%,transparent 100%)}
        .input-container{max-width:800px;margin:0 auto}
        .input-wrap{display:flex;align-items:flex-end;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:8px;transition:all .2s}
        .input-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
        .input-tools{display:flex;gap:4px;padding:4px}
        .tool-btn{background:none;border:none;color:var(--text-mut);cursor:pointer;padding:8px;border-radius:8px;transition:all .2s}
        .tool-btn:hover{background:var(--surface-h);color:var(--text)}
        .msg-input{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:Inter;resize:none;outline:none;padding:10px 0;max-height:120px;line-height:1.5}
        .msg-input::placeholder{color:var(--text-mut)}
        .send-btn{width:44px;height:44px;border-radius:12px;background:var(--primary);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .send-btn:hover{background:var(--primary-h);transform:scale(1.05)}
        .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .input-footer{text-align:center;margin-top:10px;font-size:11px;color:var(--text-mut);display:flex;align-items:center;justify-content:center;gap:4px}
        
        @media(max-width:768px){
            .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
            .overlay.open{display:block}
            .menu-btn{display:block}
            .quick-actions{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="overlay" id="overlay"></div>
        
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-logo"><i data-lucide="bot" width="20" height="20"></i></div>
                    <div class="brand-text"><h3>AmkyawDev AI</h3><span>Web Agent</span></div>
                </div>
            </div>
            <button class="new-chat-btn" id="newChatBtn"><i data-lucide="plus" width="18" height="18"></i>New Chat</button>
            <div class="history" id="chatHistory"><div class="history-label">Recent</div></div>
            <div class="sidebar-footer">
                <div class="model-select">
                    <label>AI Model</label>
                    <select id="modelSelect">
                        <option value="nvidia/nemotron-3-ultra-550b-a55b:free">NVIDIA Nemotron Ultra</option>
                        <option value="google/gemma-4-31b-it:free">Google Gemma 4</option>
                        <option value="qwen/qwen3-next-80b-a3b-instruct:free">Qwen 3</option>
                        <option value="poolside/laguna-m.1:free">Poolside Laguna</option>
                        <option value="openai/gpt-oss-20b:free">GPT-OSS 20B</option>
                        <option value="openrouter/free">Auto (Free)</option>
                    </select>
                </div>
                <div class="user-profile">
                    <div class="user-avatar"><i data-lucide="user" width="16" height="16"></i></div>
                    <div class="user-info"><h4>Guest User</h4><span>Free Tier</span></div>
                    <button class="topbar-btn"><i data-lucide="settings" width="16" height="16"></i></button>
                </div>
            </div>
        </aside>
        
        <!-- Main -->
        <main class="main">
            <header class="header">
                <div class="header-left">
                    <button class="menu-btn" id="menuBtn"><i data-lucide="menu" width="22" height="22"></i></button>
                    <div class="status"><div class="status-dot"></div><span>Online</span></div>
                </div>
                <div class="header-right">
                    <button class="topbar-btn" id="clearBtn"><i data-lucide="trash-2" width="18" height="18"></i></button>
                </div>
            </header>
            
            <div class="messages" id="messages">
                <div class="welcome" id="welcome">
                    <div class="welcome-hero"><i data-lucide="sparkles"></i></div>
                    <h1>How can I help you today?</h1>
                    <p>I'm powered by advanced AI models available for free. Ask me anything about coding, writing, analysis, or any topic you need.</p>
                    <div class="quick-actions">
                        <button class="quick-btn" data-prompt="Help me write clean, efficient Python code">
                            <div class="quick-icon"><i data-lucide="code-2" width="18" height="18"></i></div>
                            <div class="quick-content"><h4>Write Code</h4><p>Generate, debug, or explain</p></div>
                        </button>
                        <button class="quick-btn" data-prompt="Research and summarize the latest trends in AI">
                            <div class="quick-icon" style="background:var(--cyan)"><i data-lucide="search" width="18" height="18"></i></div>
                            <div class="quick-content"><h4>Research</h4><p>Search and analyze</p></div>
                        </button>
                        <button class="quick-btn" data-prompt="Help me write a professional report">
                            <div class="quick-icon" style="background:var(--grad3)"><i data-lucide="pen-tool" width="18" height="18"></i></div>
                            <div class="quick-content"><h4>Write</h4><p>Articles, emails, reports</p></div>
                        </button>
                        <button class="quick-btn" data-prompt="Explain complex concepts in simple terms">
                            <div class="quick-icon" style="background:#fbbf24"><i data-lucide="lightbulb" width="18" height="18"></i></div>
                            <div class="quick-content"><h4>Learn</h4><p>Understand any topic</p></div>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrap">
                        <div class="input-tools">
                            <button class="tool-btn"><i data-lucide="paperclip" width="18" height="18"></i></button>
                            <button class="tool-btn"><i data-lucide="mic" width="18" height="18"></i></button>
                        </div>
                        <textarea class="msg-input" id="msgInput" placeholder="Message AmkyawDev AI..." rows="1"></textarea>
                        <button class="send-btn" id="sendBtn" disabled><i data-lucide="arrow-up" width="20" height="20"></i></button>
                    </div>
                    <div class="input-footer"><i data-lucide="shield" width="12" height="12"></i>Free models powered by OpenRouter</div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',()=>{
            lucide.createIcons();
            init();
        });
        
        function init(){
            const input=document.getElementById('msgInput');
            const sendBtn=document.getElementById('sendBtn');
            const menuBtn=document.getElementById('menuBtn');
            const sidebar=document.getElementById('sidebar');
            const overlay=document.getElementById('overlay');
            const newChatBtn=document.getElementById('newChatBtn');
            const clearBtn=document.getElementById('clearBtn');
            
            input.addEventListener('input',function(){
                this.style.height='auto';
                this.style.height=Math.min(this.scrollHeight,120)+'px';
                sendBtn.disabled=!this.value.trim();
            });
            
            sendBtn.addEventListener('click',sendMessage);
            input.addEventListener('keydown',e=>{
                if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(input.value.trim())sendMessage();}
            });
            
            menuBtn?.addEventListener('click',()=>{sidebar.classList.toggle('open');overlay.classList.toggle('open');});
            overlay?.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('open');});
            newChatBtn?.addEventListener('click',resetChat);
            clearBtn?.addEventListener('click',resetChat);
            
            document.querySelectorAll('.quick-btn').forEach(btn=>{
                btn.addEventListener('click',()=>{
                    input.value=btn.getAttribute('data-prompt');
                    sendBtn.disabled=false;
                    sendMessage();
                });
            });
        }
        
        function resetChat(){
            document.getElementById('messages').innerHTML=document.getElementById('welcome').outerHTML;
            document.getElementById('msgInput').value='';
            document.getElementById('sendBtn').disabled=true;
            lucide.createIcons();
            init();
        }
        
        async function sendMessage(){
            const input=document.getElementById('msgInput');
            const sendBtn=document.getElementById('sendBtn');
            const msg=input.value.trim();
            if(!msg)return;
            
            const container=document.getElementById('messages');
            const welcome=document.getElementById('welcome');
            if(welcome)welcome.style.display='none';
            
            addMsg('user',msg);
            input.value='';
            input.style.height='auto';
            sendBtn.disabled=true;
            
            showTyping();
            
            try{
                const model=document.getElementById('modelSelect')?.value||'nvidia/nemotron-3-ultra-550b-a55b:free';
                const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,model})});
                hideTyping();
                if(resp.ok&&resp.body){
                    const reader=resp.body.getReader();
                    const assistant=addMsg('assistant','');
                    const content=assistant.querySelector('.msg-bubble');
                    const dec=new TextDecoder();
                    let full='';
                    while(true){const{done,value}=await reader.read();if(done)break;full+=dec.decode(value);content.innerHTML=formatMD(full);}
                }else{addMsg('assistant','Sorry, I encountered an error. Please try again.');}
            }catch(e){hideTyping();addMsg('assistant','Error: Could not connect to the server.');}
        }
        
        function addMsg(role,content){
            const container=document.getElementById('messages');
            const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            const html=`<div class="message ${role}"><div class="msg-avatar"><i data-lucide="${role==='user'?'user':'sparkles'}" width="18" height="18"></i></div><div class="msg-content"><div class="msg-bubble">${formatMD(content)}</div><div class="msg-time">${time}</div></div></div>`;
            container.insertAdjacentHTML('beforeend',html);
            lucide.createIcons();
            container.scrollTop=container.scrollHeight;
            return container.lastElementChild;
        }
        
        function showTyping(){
            const container=document.getElementById('messages');
            container.insertAdjacentHTML('beforeend','<div class="message assistant" id="typing"><div class="msg-avatar"><i data-lucide="sparkles" width="18" height="18"></i></div><div class="msg-content"><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>');
            lucide.createIcons();
            container.scrollTop=container.scrollHeight;
        }
        
        function hideTyping(){document.getElementById('typing')?.remove();}
        
        function formatMD(text){
            if(typeof showdown!=='undefined'){const c=new showdown.Converter();return c.makeHtml(text);}
            return text.replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
        }
    </script>
</body>
</html>
