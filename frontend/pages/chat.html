<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - AmkyawDev AI Agent</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../src/css/design-system.css" />
    <link rel="stylesheet" href="../src/css/chat.css" />
    <link rel="icon" type="image/x-icon" href="../public/favicon.ico" />
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="d-flex align-items-center gap-3">
                <div class="avatar">
                    <i data-lucide="bot" width="20" height="20"></i>
                </div>
                <div>
                    <h6 class="mb-0 fw-semibold">AmkyawDev</h6>
                    <small class="text-muted">AI Agent</small>
                </div>
            </div>
            <button class="btn btn-ghost btn-icon d-lg-none" id="closeSidebar">
                <i data-lucide="x" width="20" height="20"></i>
            </button>
        </div>
        
        <div class="sidebar-actions mt-4">
            <button class="btn btn-primary w-100" id="newChatBtn">
                <i data-lucide="plus" width="18" height="18"></i>
                New Chat
            </button>
        </div>
        
        <div class="sidebar-nav mt-4">
            <a href="index.html" class="sidebar-nav-item">
                <i data-lucide="home" width="18" height="18"></i>
                <span>Home</span>
            </a>
            <a href="docs.html" class="sidebar-nav-item">
                <i data-lucide="book-open" width="18" height="18"></i>
                <span>Docs</span>
            </a>
            <a href="skills.html" class="sidebar-nav-item">
                <i data-lucide="zap" width="18" height="18"></i>
                <span>Skills</span>
            </a>
            <a href="about.html" class="sidebar-nav-item">
                <i data-lucide="info" width="18" height="18"></i>
                <span>About</span>
            </a>
        </div>
        
        <div class="sidebar-footer mt-auto">
            <div class="divider"></div>
            <div class="user-section" id="userSection">
                <div class="d-flex align-items-center gap-3">
                    <div class="avatar avatar-sm">
                        <i data-lucide="user" width="14" height="14"></i>
                    </div>
                    <div class="flex-grow-1">
                        <small class="fw-medium" id="userName">Guest</small>
                        <small class="d-block text-muted" style="font-size: 0.7rem;">Not signed in</small>
                    </div>
                    <a href="login.html" class="btn btn-sm btn-primary">
                        Sign In
                    </a>
                </div>
            </div>
        </div>
    </aside>
    
    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Chat Area -->
    <main class="main-content">
        <!-- Chat Header -->
        <header class="chat-header">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-ghost btn-icon d-lg-none" id="menuToggle">
                        <i data-lucide="menu" width="20" height="20"></i>
                    </button>
                    <div class="d-flex align-items-center gap-2">
                        <div class="avatar avatar-sm">
                            <i data-lucide="sparkles" width="14" height="14"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-semibold">AI Assistant</h6>
                            <small class="text-muted d-flex align-items-center gap-1">
                                <span class="status-dot online"></span>
                                Online
                            </small>
                        </div>
                    </div>
                </div>
                
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-ghost btn-icon" id="clearChat" title="Clear Chat">
                        <i data-lucide="trash-2" width="18" height="18"></i>
                    </button>
                    <button class="btn btn-ghost btn-icon" id="settingsBtn" title="Settings">
                        <i data-lucide="settings" width="18" height="18"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome Message -->
            <div class="welcome-container animate-fade-in">
                <div class="welcome-icon">
                    <i data-lucide="sparkles" width="48" height="48"></i>
                </div>
                <h1 class="welcome-title">Hello, I'm AmkyawDev AI</h1>
                <p class="welcome-subtitle">Your intelligent assistant powered by advanced AI. How can I help you today?</p>
                
                <div class="suggestion-grid">
                    <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
                        <i data-lucide="atom" width="20" height="20"></i>
                        <span>Explain quantum computing</span>
                    </button>
                    <button class="suggestion-card" data-prompt="Write a Python function to sort a list">
                        <i data-lucide="code" width="20" height="20"></i>
                        <span>Write Python code</span>
                    </button>
                    <button class="suggestion-card" data-prompt="What are the best practices for REST API design?">
                        <i data-lucide="globe" width="20" height="20"></i>
                        <span>REST API best practices</span>
                    </button>
                    <button class="suggestion-card" data-prompt="Help me debug this code">
                        <i data-lucide="bug" width="20" height="20"></i>
                        <span>Debug my code</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Chat Input Area -->
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <div class="input-tools">
                    <button class="btn btn-ghost btn-icon" id="attachBtn" title="Attach file">
                        <i data-lucide="paperclip" width="18" height="18"></i>
                    </button>
                    <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.png,.jpg,.jpeg" hidden />
                </div>
                
                <div class="chat-input-area">
                    <textarea 
                        id="chatInput" 
                        class="chat-textarea" 
                        placeholder="Type your message..."
                        rows="1"
                    ></textarea>
                </div>
                
                <div class="input-actions">
                    <button class="btn btn-ghost btn-icon" id="voiceBtn" title="Voice input">
                        <i data-lucide="mic" width="18" height="18"></i>
                    </button>
                    <button class="btn btn-primary btn-icon" id="sendBtn" title="Send message">
                        <i data-lucide="send" width="18" height="18"></i>
                    </button>
                </div>
            </div>
            
            <p class="chat-footer-text">
                <i data-lucide="lock" width="12" height="12"></i>
                Messages may be stored for quality purposes. Do not share personal information.
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
    <script src="../src/js/utils.js"></script>
    <script src="../src/js/animations.js"></script>
    <script src="../src/js/fileUpload.js"></script>
    <script src="../src/js/chat.js"></script>
    <script src="../src/js/history.js"></script>
    <script src="../src/js/auth.js"></script>
    <script src="../src/js/app.js"></script>
    
    <script>
        // Initialize Lucide icons after page load
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
