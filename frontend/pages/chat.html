<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AmkyawDev AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f0f10;--surface:#1a1a1c;--card:#252529;--border:#3c3c3f;--text:#e8eaed;--text-sec:#9aa0a6;--text-mut:#80868b;--blue:#4285f4;--blue-light:#8ab4f8;--purple:#c58af9;--green:#81c995}
        body{font-family:"Google Sans",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
        .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
        .sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
        .brand{display:flex;align-items:center;gap:10px}
        .brand-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:8px;display:flex;align-items:center;justify-content:center}
        .brand-logo i{color:#fff;width:16px;height:16px}
        .brand h3{font-size:14px;font-weight:600}
        .new-chat-btn{margin:12px 16px;padding:10px 16px;background:var(--blue);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
        .new-chat-btn:hover{background:var(--blue-light);color:var(--bg)}
        .history{flex:1;overflow-y:auto;padding:0 8px}
        .history-label{padding:12px 8px 8px;font-size:11px;color:var(--text-mut);text-transform:uppercase}
        .model-select{margin:12px 16px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px}
        .model-select label{font-size:10px;color:var(--text-mut);text-transform:uppercase;display:block;margin-bottom:6px}
        .model-select select{width:100%;background:transparent;border:none;color:var(--text);font-size:13px;cursor:pointer;outline:none}
        .main{flex:1;display:flex;flex-direction:column}
        .header{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .header-left{display:flex;align-items:center;gap:12px}
        .status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-sec)}
        .status-dot{width:8px;height:8px;background:var(--green);border-radius:50%}
        .header-btn{background:none;border:none;color:var(--text-sec);cursor:pointer;padding:8px;border-radius:6px}
        .header-btn:hover{background:var(--card);color:var(--text)}
        .messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:24px}
        .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center}
        .welcome-icon{width:80px;height:80px;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
        .welcome-icon i{color:#fff;width:36px;height:36px}
        .welcome h1{font-size:24px;font-weight:600;margin-bottom:8px}
        .welcome p{font-size:14px;color:var(--text-sec);max-width:400px;margin-bottom:32px}
        .quick-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:500px}
        .quick-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text-sec);cursor:pointer;display:flex;align-items:center;gap:8px}
        .quick-btn:hover{background:var(--surface);border-color:var(--blue);color:var(--text)}
        .message{display:flex;gap:16px;max-width:800px}
        .message.user{flex-direction:row-reverse;margin-left:auto}
        .msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .message.assistant .msg-avatar{background:linear-gradient(135deg,var(--blue),var(--purple))}
        .message.user .msg-avatar{background:var(--card)}
        .msg-avatar i{color:#fff;width:16px;height:16px}
        .message.user .msg-avatar i{color:var(--text-sec)}
        .msg-content{flex:1}
        .msg-bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6}
        .message.assistant .msg-bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px}
        .message.user .msg-bubble{background:var(--blue);color:#fff;border-top-right-radius:4px}
        .msg-time{font-size:11px;color:var(--text-mut);margin-top:4px}
        .message.user .msg-time{text-align:right}
        .typing{display:flex;gap:4px;padding:4px 0}
        .typing span{width:6px;height:6px;background:var(--text-mut);border-radius:50%;animation:typing 1.4s infinite}
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
        .input-area{padding:16px 24px 24px;border-top:1px solid var(--border)}
        .input-wrap{display:flex;align-items:flex-end;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px}
        .input-wrap:focus-within{border-color:var(--blue)}
        .input-tools{display:flex;gap:4px;padding:4px}
        .tool-btn{background:none;border:none;color:var(--text-mut);cursor:pointer;padding:8px;border-radius:6px}
        .tool-btn:hover{background:var(--surface);color:var(--text)}
        .msg-input{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;padding:10px 0;max-height:120px;line-height:1.5}
        .msg-input::placeholder{color:var(--text-mut)}
        .send-btn{width:40px;height:40px;border-radius:10px;background:var(--blue);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .send-btn:hover{background:var(--blue-light);color:var(--bg)}
        .send-btn:disabled{opacity:.4;cursor:not-allowed}
        .input-footer{text-align:center;margin-top:10px;font-size:11px;color:var(--text-mut)}
        @media(max-width:768px){
            .sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;z-index:100;transform:translateX(-100%)}
            .sidebar.open{transform:translateX(0)}
            .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
            .sidebar-overlay.open{display:block}
            .menu-btn{display:block!important}
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="brand"><div class="brand-logo"><i data-lucide="sparkles"></i></div><h3>AmkyawDev AI</h3></div></div>
        <button class="new-chat-btn" id="newChat"><i data-lucide="plus" width="16" height="16"></i>New Chat</button>
        <div class="history"><div class="history-label">Recent</div></div>
        <div class="model-select">
            <label>AI Model</label>
            <select id="model">
                <option value="nvidia/nemotron-3-ultra-550b-a55b:free">Nemotron Ultra</option>
                <option value="google/gemma-4-31b-it:free">Gemma 4</option>
                <option value="qwen/qwen3-next-80b-a3b-instruct:free">Qwen 3</option>
                <option value="poolside/laguna-m.1:free">Laguna M.1</option>
                <option value="openai/gpt-oss-20b:free">GPT-OSS 20B</option>
                <option value="openrouter/free">Auto (Free)</option>
            </select>
        </div>
    </aside>
    <main class="main">
        <header class="header">
            <div class="header-left">
                <button class="header-btn menu-btn" id="menuBtn" style="display:none"><i data-lucide="menu" width="20" height="20"></i></button>
                <div class="status"><div class="status-dot"></div><span>Online</span></div>
            </div>
            <div class="header-right"><button class="header-btn" id="clearBtn"><i data-lucide="trash-2" width="18" height="18"></i></button></div>
        </header>
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-icon"><i data-lucide="sparkles"></i></div>
                <h1>How can I help you?</h1>
                <p>Ask me anything. Powered by free AI models from OpenRouter.</p>
                <div class="quick-btns">
                    <button class="quick-btn" data-p="Write Python code"><i data-lucide="code" width="14" height="14"></i> Write Code</button>
                    <button class="quick-btn" data-p="Explain this concept"><i data-lucide="lightbulb" width="14" height="14"></i> Explain</button>
                    <button class="quick-btn" data-p="Research this topic"><i data-lucide="search" width="14" height="14"></i> Research</button>
                    <button class="quick-btn" data-p="Write an article"><i data-lucide="pen-tool" width="14" height="14"></i> Write</button>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrap">
                <div class="input-tools">
                    <button class="tool-btn"><i data-lucide="paperclip" width="16" height="16"></i></button>
                    <button class="tool-btn"><i data-lucide="mic" width="16" height="16"></i></button>
                </div>
                <textarea class="msg-input" id="msgInput" placeholder="Message..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" disabled><i data-lucide="arrow-up" width="18" height="18"></i></button>
            </div>
            <div class="input-footer">Free models powered by OpenRouter</div>
        </div>
    </main>
    <script>
        document.addEventListener("DOMContentLoaded",()=>{lucide.createIcons();init()});
        function init(){
            const input=document.getElementById("msgInput"),sendBtn=document.getElementById("sendBtn");
            input.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";sendBtn.disabled=!this.value.trim()});
            sendBtn.addEventListener("click",sendMsg);
            input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(input.value.trim())sendMsg()}});
            document.getElementById("menuBtn")?.addEventListener("click",()=>{document.getElementById("sidebar").classList.toggle("open");document.getElementById("overlay").classList.toggle("open")});
            document.getElementById("overlay")?.addEventListener("click",()=>{document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open")});
            document.getElementById("newChat")?.addEventListener("click",resetChat);
            document.getElementById("clearBtn")?.addEventListener("click",resetChat);
            document.querySelectorAll(".quick-btn").forEach(btn=>{btn.addEventListener("click",()=>{input.value=btn.getAttribute("data-p");sendBtn.disabled=false;sendMsg()})});
        }
        function resetChat(){document.getElementById("messages").innerHTML=document.getElementById("welcome").outerHTML;document.getElementById("msgInput").value="";document.getElementById("sendBtn").disabled=true;lucide.createIcons();init()}
        function addMsg(role,content){const c=document.getElementById("messages");const time=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});c.insertAdjacentHTML("beforeend",`<div class="message ${role}"><div class="msg-avatar"><i data-lucide="${role==="user"?"user":"sparkles"}" width="16" height="16"></i></div><div class="msg-content"><div class="msg-bubble">${content}</div><div class="msg-time">${time}</div></div></div>`);lucide.createIcons();c.scrollTop=c.scrollHeight}
        async function sendMsg(){const input=document.getElementById("msgInput"),sendBtn=document.getElementById("sendBtn");const msg=input.value.trim();if(!msg)return;if(document.getElementById("welcome"))document.getElementById("welcome").style.display="none";addMsg("user",msg);input.value="";input.style.height="auto";sendBtn.disabled=true;addMsg("assistant",'<div class="typing"><span></span><span></span><span></span></div>');document.getElementById("messages").scrollTop=1e9;await new Promise(r=>setTimeout(r,1500));document.querySelector(".message.assistant:last-child .msg-bubble").innerHTML="I am powered by free AI models! Connect to the API to start chatting."}
    </script>
</body>
</html>
