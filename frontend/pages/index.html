<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmkyawDev AI Agent</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome 6 Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/chat.css" />
    <link rel="stylesheet" href="../css/animations.css" />
    
    <link rel="icon" type="image/png" href="/public/favicon.ico" />
</head>
<body>
    <!-- Offcanvas Sidebar (Bootstrap) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header">
            <div class="d-flex align-items-center gap-2">
                <img src="/public/images/admin.png" alt="AmkyawDev AI" width="40" height="40" class="rounded-circle border border-2 border-primary" />
                <h5 class="offcanvas-title" id="sidebarLabel">AmkyawDev AI</h5>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <!-- Navigation -->
            <nav class="nav flex-column nav-pills">
                <a href="/" class="nav-link active" data-page="home">
                    <i class="fas fa-home me-2"></i> Home
                </a>
                <a href="/docs.html" class="nav-link" data-page="docs">
                    <i class="fas fa-book me-2"></i> Docs
                </a>
                <a href="/skills.html" class="nav-link" data-page="skills">
                    <i class="fas fa-brain me-2"></i> Skills
                </a>
                <a href="/about.html" class="nav-link" data-page="about">
                    <i class="fas fa-info-circle me-2"></i> About
                </a>
            </nav>
            
            <!-- User Section -->
            <div class="mt-auto pt-3 border-top">
                <div id="user-info" class="d-flex justify-content-between align-items-center">
                    <span id="user-name" class="fw-semibold">
                        <i class="fas fa-user-circle me-1"></i> Guest
                    </span>
                    <button id="logout-btn" class="btn btn-sm btn-outline-danger" style="display:none;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
                <a href="/login.html" id="login-link" class="btn btn-primary btn-sm w-100 mt-2">
                    <i class="fas fa-sign-in-alt me-1"></i> Sign In
                </a>
            </div>
        </div>
    </div>


    <!-- Main Chat Container -->
    <div class="d-flex flex-column vh-100" id="app-container">
        <!-- Top Navbar -->
        <nav class="navbar navbar-light bg-white border-bottom shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-outline-secondary" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="navbar-brand mb-0 h5">
                    <img src="/public/images/admin.png" alt="AI" width="30" height="30" class="rounded-circle me-2" />
                    AI Agent Chat
                </span>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" id="new-chat-btn">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button class="btn btn-outline-secondary btn-sm" id="history-toggle">
                        <i class="fas fa-history"></i>
                    </button>
                </div>
            </div>
        </nav>


        <!-- Chat Messages Area -->
        <div class="flex-grow-1 overflow-auto p-3 p-md-4" id="chat-messages" style="background-color: #f8f9fa;">
            <div class="message bot d-flex gap-2 mb-3">
                <img src="/public/images/admin.png" alt="AI" width="36" height="36" class="rounded-circle flex-shrink-0" />
                <div class="message-content bg-white p-3 rounded-3 shadow-sm">
                    <p class="mb-0">Hello! I'm AmkyawDev AI Agent. How can I help you today?</p>
                </div>
            </div>
        </div>


        <!-- Chat Input Area -->
        <div class="bg-white border-top p-3" id="chat-input-area">
            <div id="upload-preview" class="d-none alert alert-info alert-dismissible fade show py-2">
                <span id="file-name" class="small"></span>
                <button type="button" class="btn-close" id="remove-file-btn"></button>
            </div>
            
            <div class="input-group">
                <button class="btn btn-outline-secondary" type="button" id="upload-btn">
                    <i class="fas fa-paperclip"></i>
                </button>
                <input type="file" id="file-input" accept=".txt,.pdf,.docx,.png,.jpg,.jpeg" style="display:none;" />
                
                <textarea id="user-input" class="form-control" rows="1" placeholder="Type your message..." style="resize: none;"></textarea>
                
                <button class="btn btn-primary" type="button" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            
            <div class="d-flex gap-3 mt-2 small text-muted">
                <button class="btn btn-link btn-sm text-decoration-none text-muted p-0" id="search-toggle">
                    <i class="fas fa-search me-1"></i> Search
                </button>
                <button class="btn btn-link btn-sm text-decoration-none text-muted p-0" id="clear-history-btn">
                    <i class="fas fa-trash-alt me-1"></i> Clear
                </button>
            </div>
        </div>
    </div>


    <!-- History Offcanvas (Right Side) -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="historyOffcanvas" aria-labelledby="historyLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="historyLabel"><i class="fas fa-history me-2"></i>Chat History</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="list-group list-group-flush" id="history-list">
                <li class="list-group-item text-muted text-center">No history yet.</li>
            </ul>
        </div>
    </div>


    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script type="module" src="../js/utils.js"></script>
    <script type="module" src="../js/animations.js"></script>
    <script type="module" src="../js/fileUpload.js"></script>
    <script type="module" src="../js/chat.js"></script>
    <script type="module" src="../js/history.js"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
